<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password dimenticata — Repliq</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
    .logo { font-size: 24px; font-weight: 900; color: #2563eb; text-align: center; margin-bottom: 8px; }
    .title { font-size: 20px; font-weight: 800; color: #1e293b; text-align: center; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #64748b; text-align: center; margin-bottom: 28px; line-height: 1.5; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input { width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; transition: border-color 0.15s; }
    input:focus { border-color: #2563eb; }
    .btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 16px; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.9; }
    .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; }
    .success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; }
    .back { text-align: center; margin-top: 20px; font-size: 13px; color: #64748b; }
    .back a { color: #2563eb; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Repliq</div>
    <div class="title">Password dimenticata?</div>
    <div class="subtitle">Inserisci la tua email e ti mandiamo un link per reimpostarla.</div>

    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    {% if success %}
    <div class="success">✅ Email inviata! Controlla la tua casella (e lo spam). Il link è valido per 30 minuti.</div>
    {% else %}
    <form method="POST" action="/api/forgot-password">
      <div style="margin-bottom: 16px;">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="tua@email.it" required autocomplete="email">
      </div>
      <button type="submit" class="btn">Invia link di reset →</button>
    </form>
    {% endif %}

    <div class="back"><a href="/login">← Torna al login</a></div>
  </div>
</body>
</html>
